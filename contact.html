<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <!-- resetten van browsers -->
  <link rel="stylesheet" href="./css/reset.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap CSS icons: https://icons.getbootstrap.com/#usage -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- JavaScript: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer>
    </script>
  <!-- eigen geschreven css voor jouw html-bestand -->
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="bg-light p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <img src="./assets/images/logo.png" class="logo" alt="Logo van mijn portfolio">
        <nav>
            <a href="index.html" class="mx-2">Home</a>
            <a href="portfolio.html" class="mx-2">Portfolio</a>
            <a href="contact.html" class="mx-2">Contact</a>
        </nav>
    </div>
</header>

<main class="container my-4">

    <div class="row">

        <!-- CONTACT INFO -->
        <aside class="col-md-4 bg-light p-3">
            <h4>Contact</h4>
            <p><strong>Email:</strong> xxx</p>
            <p><strong>Telefoon:</strong> xxx</p>
        </aside>

        <!-- FORMULIER -->
        <section class="col-md-8">
            <h1>Formulier</h1>

            <form>

                <div class="mb-3">
                    <label class="form-label">Titel</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Voornaam</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tweede naam</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Achternaam</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bericht</label>
                    <textarea class="form-control" rows="5"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Verstuur
                </button>

            </form>
        </section>

    </div>

</main>

<footer class="bg-light text-center p-3">
    Footer
</footer>

</body>
</html>
